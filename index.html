document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

    <sc-for list=\"{{ options }}\" as=\"o\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ o.pick }}\" disabled=\"{{ o.tried }}\" style=\"cursor:{{ o.cursor }};opacity:{{ o.opacity }};flex:1;max-width:300px;text-align:left;background:#FFFFFF;border:1.5px solid #C9D2E8;border-radius:18px;border-bottom-right-radius:6px;padding:14px 16px;font-family:'Archivo',sans-serif;display:flex;flex-direction:column;gap:8px;box-shadow:0 2px 8px rgba(19,36,107,0.06);transition:all .15s ease;\" style-hover=\"border-color:#13246B;transform:translateY(-2px);box-shadow:0 8px 18px rgba(19,36,107,0.12);\">\n                  <span style=\"display:flex;align-items:center;gap:8px;\">\n                    <span style=\"flex:none;width:22px;height:22px;border-radius:50%;background:#13246B;color:#FFFFFF;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;\">{{ o.letter }}<\u002Fspan>\n                    <sc-if value=\"{{ o.tried }}\" hint-placeholder-val=\"{{ false }}\">\n                      <span style=\"font-size:10px;font-weight:800;letter-spacing:0.08em;color:#E0483E;background:rgba(224,72,62,0.1);padding:3px 8px;border-radius:999px;\">FLAGGED BY FEDDY<\u002Fspan>\n                    <\u002Fsc-if>\n                  <\u002Fspan>\n                  <span style=\"font-size:13.5px;line-height:1.45;color:#2A3352;\">{{ o.text }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ showWaitHint }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align:center;font-size:12.5px;color:#9AA3BC;padding-top:40px;animation:fadeIn .6s ease;\">{{ waitHint }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ feddyOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:rgba(11,20,50,0.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;animation:fadeIn .25s ease;z-index:30;\">\n            <div style=\"width:560px;max-width:88%;background:#FFFFFF;border-radius:22px;padding:28px;display:flex;gap:24px;align-items:flex-start;box-shadow:0 30px 80px rgba(0,0,0,0.35);animation:riseUp .3s ease;border-top:6px solid #F9A21B;\">\n              <img src=\"1e8d7362-dc57-4b61-8ed6-2700a3763268\" alt=\"Feddy\" style=\"flex:none;height:220px;margin:-6px 0 -34px;\">\n              <div style=\"flex:1;padding-top:4px;\">\n                <div style=\"display:inline-flex;align-items:center;gap:7px;background:rgba(249,162,27,0.14);color:#B06E00;font-size:11px;font-weight:800;letter-spacing:0.12em;padding:5px 12px;border-radius:999px;\">\n                  <span style=\"width:7px;height:7px;border-radius:50%;background:#F9A21B;\"><\u002Fspan>FEDDY INTERRUPT\n                <\u002Fdiv>\n                <div style=\"margin-top:12px;font-size:21px;font-weight:800;color:#13246B;line-height:1.2;\">{{ feddyFlag }}<\u002Fdiv>\n                <div style=\"margin-top:10px;font-size:14.5px;line-height:1.55;color:#4A5578;\">{{ feddyTip }}<\u002Fdiv>\n                <button onclick=\"{{ tryAgain }}\" style=\"margin-top:18px;border:none;cursor:pointer;background:#F9A21B;color:#13246B;font-family:'Archivo',sans-serif;font-size:15px;font-weight:800;padding:12px 30px;border-radius:999px;box-shadow:0 6px 16px rgba(249,162,27,0.35);\" style-hover=\"transform:translateY(-1px);box-shadow:0 10px 20px rgba(249,162,27,0.45);\">Try Again<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ resolved }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:rgba(11,20,50,0.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;animation:fadeIn .4s ease;z-index:30;\">\n            <div style=\"width:480px;max-width:88%;background:#FFFFFF;border-radius:22px;padding:40px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,0.35);animation:riseUp .35s ease;border-top:6px solid #2BA05A;\">\n              <div style=\"width:56px;height:56px;border-radius:50%;background:rgba(43,160,90,0.12);margin:0 auto 18px;display:flex;align-items:center;justify-content:center;\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\"><path d=\"M4 12.5l5 5L20 6.5\" stroke=\"#2BA05A\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div style=\"font-size:30px;font-weight:900;color:#13246B;\">You made it through.<\u002Fdiv>\n              <div style=\"margin-top:10px;font-size:14.5px;line-height:1.55;color:#5A6482;\">{{ resolutionLine }}<\u002Fdiv>\n              <button onclick=\"{{ showScore }}\" style=\"margin-top:24px;border:none;cursor:pointer;background:#13246B;color:#FFFFFF;font-family:'Archivo',sans-serif;font-size:15px;font-weight:800;padding:14px 34px;border-radius:999px;\" style-hover=\"transform:translateY(-1px);box-shadow:0 10px 20px rgba(19,36,107,0.3);\">See your Wise Score<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ showScoreScreen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"width:100%;height:100%;background:#13246B;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;\">\n      <div style=\"position:absolute;top:-160px;left:-160px;width:480px;height:480px;border-radius:50%;background:rgba(249,162,27,0.07);\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:flex-end;gap:0;animation:riseUp .5s ease;\">\n        <img src=\"1e8d7362-dc57-4b61-8ed6-2700a3763268\" alt=\"Feddy\" style=\"height:380px;margin-right:-40px;position:relative;z-index:2;\">\n        <div style=\"width:460px;background:#FFFFFF;border-radius:24px;padding:44px 44px 36px 64px;text-align:left;box-shadow:0 40px 100px rgba(0,0,0,0.4);\">\n          <div style=\"font-size:12px;font-weight:800;letter-spacing:0.18em;color:#B06E00;\">WISE SCORE<\u002Fdiv>\n          <div style=\"margin-top:6px;font-size:72px;font-weight:900;color:#13246B;line-height:1;\">{{ wiseScore }}<span style=\"font-size:32px;color:#9AA3BC;font-weight:700;\">/3<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-top:10px;font-size:17px;font-weight:700;color:#2A3352;\">{{ charName }} stayed safe today.<\u002Fdiv>\n          <div style=\"margin-top:22px;display:flex;gap:12px;\">\n            <div style=\"flex:1;background:#F1F4FA;border-radius:14px;padding:14px 16px;\">\n              <div style=\"font-size:26px;font-weight:900;color:#2BA05A;\">{{ cleanPicks }}<\u002Fdiv>\n              <div style=\"font-size:12px;font-weight:600;color:#5A6482;margin-top:2px;\">Clean picks<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;background:#F1F4FA;border-radius:14px;padding:14px 16px;\">\n              <div style=\"font-size:26px;font-weight:900;color:#E0483E;\">{{ interrupts }}<\u002Fdiv>\n              <div style=\"font-size:12px;font-weight:600;color:#5A6482;margin-top:2px;\">Feddy interrupts<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:26px;display:flex;flex-direction:column;gap:10px;\">\n            <button onclick=\"{{ playOther }}\" style=\"border:none;cursor:pointer;background:#F9A21B;color:#13246B;font-family:'Archivo',sans-serif;font-size:15px;font-weight:800;padding:14px;border-radius:999px;box-shadow:0 6px 16px rgba(249,162,27,0.3);\" style-hover=\"transform:translateY(-1px);\">Play the other scenario: {{ otherThemeName }}<\u002Fbutton>\n            <button title=\"Non-functional in this mock\" style=\"cursor:default;background:#FFFFFF;border:1.5px solid #C9D2E8;color:#7A84A0;font-family:'Archivo',sans-serif;font-size:14px;font-weight:700;padding:12px;border-radius:999px;\">Share your score<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;bottom:28px;font-size:11px;font-weight:700;letter-spacing:0.18em;color:rgba(255,255,255,0.35);\">FEDERAL BANK · TWICE IS WISE<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;startTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;arrest&quot;,&quot;mule&quot;],&quot;default&quot;:&quot;mule&quot;,&quot;tsType&quot;:&quot;'arrest' | 'mule'&quot;,&quot;section&quot;:&quot;Scenario&quot;},&quot;pace&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;min&quot;:0.5,&quot;max&quot;:3,&quot;step&quot;:0.25,&quot;default&quot;:1,&quot;unit&quot;:&quot;×&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;lockRiskyRetries&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Behavior&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'landing', theme: 'arrest', layer: 0,\n    messages: [], typing: false, showOptions: false,\n    feddy: null, tried: {}, clean: [true, true, true],\n    interrupts: 0, resolved: false, msgId: 0\n  };\n\n  data = {\n    arrest: {\n      name: 'Digital Arrest',\n      contact: { name: '+91 90311 74428', tag: 'Not in your contacts', initial: '?' },\n      character: {\n        name: 'Ramesh Iyer', age: 34, city: 'Nagpur',\n        occupation: 'Works at a logistics firm',\n        family: \"Married, two kids — just paid his daughter's school fee this week\",\n        backstory: \"Ramesh has never dealt with the police or a legal notice in his life. He answers unknown calls because he's expecting a delivery update.\"\n      },\n      layers: [\n        {\n          msg: 'This is Inspector Verma, Cyber Crime Cell, Mumbai. Your Aadhaar number has been linked to a money laundering case under investigation. Do not disconnect this chat.',\n          options: [\n            { text: \"Which police station? I'll come in person.\", safe: true },\n            { text: \"I'm on my way, please don't file anything, tell me what to do.\", safe: false,\n              flag: 'Agreeing before verifying',\n              tip: \"Real police don't investigate over chat, and they never ask you to 'cooperate' before showing a warrant. Agreeing to comply before you've verified anything is exactly what this message is designed to make you do.\" },\n            { text: \"Sir please don't arrest me, I have kids, I'll do whatever is needed.\", safe: false,\n              flag: 'Panic, then instant compliance',\n              tip: \"Notice what just happened — panic, then instant compliance. That's the entire scam. Fear is the tool, not the crime.\" }\n          ]\n        },\n        {\n          msg: 'This is a serious matter. I can connect you to a senior officer, but you must stay on this chat and share your Aadhaar and bank details for verification right now.',\n          options: [\n            { text: \"I won't share any details over chat. Send an official notice to my registered address.\", safe: true },\n            { text: \"Okay, here's my Aadhaar number and bank account, please just resolve this fast.\", safe: false,\n              flag: 'Sharing details over chat',\n              tip: 'No verification process anywhere requires your bank details over chat. This request has one purpose — collecting information a scammer can use.' },\n            { text: 'Can I call this number back to confirm?', safe: false,\n              flag: \"Verifying on the scammer's channel\",\n              tip: \"Good instinct to verify — but calling back a number the scammer gave you doesn't verify anything, it just confirms you're still on the hook. Verify through an independent, official channel instead.\" }\n          ]\n        },\n        {\n          msg: 'Fine. But if you disconnect now, a warrant will be issued within the hour. Last chance — stay on this chat and complete the verification.',\n          options: [\n            { text: \"I'm disconnecting. I'll verify this independently with my local police station.\", safe: true },\n            { text: \"Wait, don't issue anything, I'm still here, tell me what you need.\", safe: false,\n              flag: 'The deadline trick',\n              tip: 'A countdown designed to make you choose fear over logic. No genuine legal process threatens you into staying on a chat.' },\n            { text: \"Let me ask my family first and I'll get back to you.\", safe: false,\n              flag: 'Not allowed to pause',\n              tip: 'Better instinct than most — but notice the scammer never lets you leave the conversation to think. Any message that punishes you for pausing is the red flag itself.' }\n          ]\n        }\n      ],\n      resolution: 'The chat goes silent. No warrant. No case. Just a scammer who ran out of leverage the moment Ramesh stopped answering.'\n    },\n    mule: {\n      name: 'Mule Account',\n      contact: { name: 'TalentBridge HR', tag: 'Unknown business account', initial: 'T' },\n      character: {\n        name: 'Priya Nair', age: 23, city: 'Kochi',\n        occupation: 'Recently finished college, looking for part-time work',\n        family: 'Lives with parents, wants to contribute to household income',\n        backstory: \"Priya applies to part-time listings on social media and messaging apps. She's careful about scams she's heard of — but hasn't heard of this one.\"\n      },\n      layers: [\n        {\n          msg: \"Hi Priya! Saw your profile — we're hiring for a part-time remote role. ₹5,000/day, flexible hours. All you need is a working bank account. Interested?\",\n          options: [\n            { text: 'What does the role actually involve day-to-day?', safe: true },\n            { text: 'Yes! What do I need to do to start?', safe: false,\n              flag: 'Too much pay, too little detail',\n              tip: '₹5,000/day for a role with no description, no company name, and no interview — that payout size for that little detail is the first warning sign, not a lucky break.' },\n            { text: 'Sounds good, send me the registration form.', safe: false,\n              flag: 'Signing up blind',\n              tip: \"Notice there's still no explanation of the actual work. Signing up before you know what you're agreeing to is how the hook gets set.\" }\n          ]\n        },\n        {\n          msg: \"Simple — you'll receive payments from our clients into your account, then transfer them to the vendors we specify. You keep a commission on every transfer.\",\n          options: [\n            { text: \"That means using my personal account to move money for people I don't know — I'm not comfortable with that.\", safe: true },\n            { text: \"Okay, sounds easy, I'm in.\", safe: false,\n              flag: 'The mule account setup',\n              tip: \"This is the mule account setup, in one sentence. Any 'job' where the core task is moving other people's money through your account makes you legally responsible for where that money came from.\" },\n            { text: 'Can I use a separate account just for this?', safe: false,\n              flag: 'Separate account, same risk',\n              tip: \"Separating the account doesn't separate the risk — the account is still yours, and you're still the one who'll have to explain the transactions if they're flagged.\" }\n          ]\n        },\n        {\n          msg: \"No pressure — but this is limited slots, and most people are earning ₹30,000+ a month already. Your account, your rules, we just need it active by tonight.\",\n          options: [\n            { text: \"I'll pass. I don't want my account used for transactions I can't explain.\", safe: true },\n            { text: \"Fine, let's start tonight then.\", safe: false,\n              flag: 'Urgency closes the deal',\n              tip: \"The urgency, the earnings figure, the 'your rules' framing — all designed to close the deal before you check anything. This is a mule account recruitment pitch with a deadline stapled to it.\" },\n            { text: \"Let me think about it and message you tomorrow.\", safe: false,\n              flag: 'The manufactured deadline',\n              tip: \"Reasonable-sounding, but 'limited slots by tonight' is a manufactured deadline. There's no real slot to lose — only a scammer hoping you don't get time to think.\" }\n          ]\n        }\n      ],\n      resolution: 'The recruiter stops replying. No slot, no client, no job — just another account that didn\\u2019t get handed over.'\n    }\n  };\n\n  timers = [];\n  after(ms, fn) { this.timers.push(setTimeout(fn, ms / (this.props.pace ?? 1))); }\n  componentWillUnmount() { this.timers.forEach(clearTimeout); }\n\n  componentDidMount() {\n    const t = this.props.startTheme;\n    if (t && this.data[t] && this.state.screen === 'landing') this.setState({ theme: t });\n  }\n\n  scrollChat() {\n    const go = () => { const el = this.chatEl; if (el) el.scrollTop = el.scrollHeight; };\n    requestAnimationFrame(go);\n    setTimeout(go, 80);\n    setTimeout(go, 350);\n  }\n\n  componentDidUpdate() { this.scrollChat(); }\n\n  scen() { return this.data[this.state.theme]; }\n\n  addMsg(kind, text) {\n    this.setState(s => ({ messages: [...s.messages, { id: s.msgId, kind, text }], msgId: s.msgId + 1 }));\n    this.scrollChat();\n  }\n\n  incoming(text, delay) {\n    this.after(delay, () => {\n      this.setState({ typing: true });\n      this.after(1600, () => {\n        this.setState({ typing: false });\n        this.addMsg('in', text);\n        this.after(600, () => this.setState({ showOptions: true }));\n      });\n    });\n  }\n\n  start = () => {\n    this.setState({ screen: 'game' });\n    this.incoming(this.scen().layers[0].msg, 1800);\n  };\n\n  toggleTheme = () => this.setState(s => ({ theme: s.theme === 'arrest' ? 'mule' : 'arrest' }));\n\n  pick(i) {\n    const { layer } = this.state;\n    const opt = this.scen().layers[layer].options[i];\n    this.setState({ showOptions: false });\n    this.addMsg('out', opt.text);\n    if (opt.safe) {\n      if (layer < 2) {\n        this.setState({ layer: layer + 1 });\n        this.incoming(this.scen().layers[layer + 1].msg, 1100);\n      } else {\n        this.setState({ layer: 3 });\n        this.after(1500, () => {\n          this.addMsg('sys', this.scen().resolution);\n          this.after(1800, () => this.setState({ resolved: true }));\n        });\n      }\n    } else {\n      this.setState(s => {\n        const clean = [...s.clean]; clean[layer] = false;\n        return { clean, interrupts: s.interrupts + 1, tried: { ...s.tried, [layer + '-' + i]: true } };\n      });\n      this.after(1000, () => this.setState({ feddy: { flag: opt.flag, tip: opt.tip } }));\n    }\n  }\n\n  tryAgain = () => {\n    this.setState(s => ({ feddy: null, messages: s.messages.slice(0, -1), showOptions: true }));\n  };\n\n  showScore = () => this.setState({ screen: 'score', resolved: false });\n\n  resetTo(theme) {\n    this.timers.forEach(clearTimeout); this.timers = [];\n    this.setState({\n      theme, screen: 'game', layer: 0, messages: [], typing: false,\n      showOptions: false, feddy: null, tried: {}, clean: [true, true, true],\n      interrupts: 0, resolved: false\n    });\n    this.after(100, () => this.incoming(this.data[theme].layers[0].msg, 1600));\n  }\n\n  playOther = () => this.resetTo(this.state.theme === 'arrest' ? 'mule' : 'arrest');\n\n  chatRefCb = (el) => { this.chatEl = el; };\n\n  renderVals() {\n    const s = this.state;\n    const sc = this.data[s.theme];\n    const lock = this.props.lockRiskyRetries ?? true;\n    const layerIdx = Math.min(s.layer, 2);\n\n    const msgs = s.messages.map(m => ({\n      id: m.id, text: m.text,\n      isBubble: m.kind !== 'sys', isSys: m.kind === 'sys',\n      justify: m.kind === 'out' ? 'flex-end' : 'flex-start',\n      bg: m.kind === 'out' ? '#0A7CFF' : '#E9E9EB',\n      color: m.kind === 'out' ? '#fff' : '#111',\n      blr: m.kind === 'out' ? '18px' : '5px',\n      brr: m.kind === 'out' ? '5px' : '18px'\n    }));\n\n    const options = sc.layers[layerIdx].options.map((o, i) => {\n      const tried = lock && !!s.tried[layerIdx + '-' + i];\n      return {\n        letter: 'ABC'[i], text: o.text, tried,\n        cursor: tried ? 'not-allowed' : 'pointer',\n        opacity: tried ? 0.45 : 1,\n        pick: () => { if (!tried && !s.feddy) this.pick(i); }\n      };\n    });\n\n    const progress = s.layer;\n    const dots = [0, 1, 2].map(i => ({\n      bg: i < progress ? '#2BA05A' : (i === progress && s.layer < 3 ? '#F9A21B' : '#D5D9E4'),\n      ring: i === progress && s.layer < 3 ? '0 0 0 3px rgba(249,162,27,0.25)' : 'none'\n    }));\n\n    const ch = sc.character;\n    const other = s.theme === 'arrest' ? this.data.mule : this.data.arrest;\n    const inGame = s.screen === 'game';\n\n    return {\n      showLanding: s.screen === 'landing',\n      showGame: inGame,\n      showScoreScreen: s.screen === 'score',\n      themeName: sc.name,\n      themeNameUpper: 'SCENARIO: ' + sc.name.toUpperCase(),\n      otherThemeName: other.name,\n      charName: ch.name, charAge: ch.age, charCity: ch.city,\n      charOccupation: ch.occupation, charFamily: ch.family, charBackstory: ch.backstory,\n      charFirstUpper: ch.name.split(' ')[0].toUpperCase(),\n      contactName: sc.contact.name, contactTag: sc.contact.tag, contactInitial: sc.contact.initial,\n      chatTime: s.theme === 'arrest' ? '11:42 AM' : '4:17 PM',\n      phoneW: 360, phoneH: 640,\n      msgs, typing: s.typing, options, dots,\n      layerNum: layerIdx + 1,\n      showOptions: s.showOptions && !s.feddy && !s.resolved,\n      showWaitHint: inGame && !s.showOptions && !s.feddy && !s.resolved && s.layer < 3,\n      waitHint: s.messages.length === 0 ? 'Someone is messaging ' + ch.name.split(' ')[0] + '…' : 'Waiting for their reply…',\n      feddyOpen: !!s.feddy,\n      feddyFlag: s.feddy ? s.feddy.flag : '',\n      feddyTip: s.feddy ? s.feddy.tip : '',\n      resolved: s.resolved,\n      resolutionLine: sc.resolution,\n      wiseScore: s.clean.filter(Boolean).length,\n      cleanPicks: s.clean.filter(Boolean).length,\n      interrupts: s.interrupts,\n      start: this.start, toggleTheme: this.toggleTheme, tryAgain: this.tryAgain,\n      showScore: this.showScore, playOther: this.playOther,\n      chatRefCb: this.chatRefCb\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
